[graph]
targets = []
all-features = true

[advisories]
# Advisory database is checked by default.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "AGPL-3.0-only",
    "GPL-3.0-only",
    "Zlib",
]

# goonj 1.1.0 uses deprecated "GPL-3.0" SPDX identifier instead of "GPL-3.0-only"
# TODO: remove when goonj publishes a fix
exceptions = [
    { allow = ["GPL-3.0"], name = "goonj", version = "1.1.0" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
